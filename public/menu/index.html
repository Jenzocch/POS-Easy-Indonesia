<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>線上點餐</title>
  <base href="/menu/">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <header id="header">
      <h1 id="store-name">載入中...</h1>
      <p class="subtitle">線上點餐系統</p>
    </header>

    <!-- 搜尋 -->
    <div class="search-bar">
      <input type="text" id="search-input" placeholder="搜尋商品..." oninput="setSearch(this.value)"/>
    </div>

    <!-- 分類選擇 -->
    <nav id="categories" class="categories"></nav>

    <!-- 商品列表 -->
    <main id="product-list" class="product-list"></main>

    <!-- 購物車浮動按鈕 -->
    <button id="cart-fab" class="cart-fab" onclick="toggleCart()">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
        <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
      </svg>
      <span id="cart-badge" class="cart-badge">0</span>
    </button>

    <!-- 購物車面板 -->
    <div id="cart-overlay" class="cart-overlay" onclick="toggleCart()"></div>
    <div id="cart-panel" class="cart-panel">
      <div class="cart-header">
        <h2>購物車</h2>
        <button onclick="toggleCart()" class="close-btn">&times;</button>
      </div>
      <div id="cart-items" class="cart-items"></div>
      <div id="cart-footer" class="cart-footer">
        <div class="cart-total">
          <span>合計</span>
          <span id="cart-total-amount">$0</span>
        </div>
        <button id="checkout-btn" class="checkout-btn" onclick="submitOrder()" disabled>
          送出訂單
        </button>
      </div>
    </div>

    <!-- 訂單提交表單 -->
    <div id="order-form-overlay" class="order-form-overlay" style="display:none">
      <div class="order-form">
        <h2>確認訂單</h2>
        <div class="form-group">
          <label>您的姓名（選填）</label>
          <input type="text" id="customer-name" placeholder="方便取餐時叫號">
        </div>
        <div class="form-group">
          <label>桌號 / 備註（選填）</label>
          <input type="text" id="table-num" placeholder="例如: 3號桌">
        </div>
        <div class="form-group">
          <label>備註</label>
          <textarea id="order-note" placeholder="特殊需求..." rows="2"></textarea>
        </div>
        <div class="form-total">
          合計: <strong id="form-total">$0</strong>
        </div>
        <div class="form-actions">
          <button onclick="closeOrderForm()" class="btn-secondary">取消</button>
          <button onclick="confirmOrder()" class="btn-primary">確認送出</button>
        </div>
      </div>
    </div>

    <!-- 訂單完成 -->
    <div id="order-success" class="order-success" style="display:none">
      <div class="success-content">
        <div class="success-icon">&#10003;</div>
        <h2>訂單已送出!</h2>
        <p id="success-order-id"></p>
        <p id="success-status" class="status-text">等待店家確認中...</p>
        <button onclick="resetApp()" class="btn-primary">繼續點餐</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
