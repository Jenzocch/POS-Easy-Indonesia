<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Pesan Online</title>
  <base href="/menu/">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <header id="header">
      <h1 id="store-name" data-i18n="loading">Memuat...</h1>
      <p class="subtitle" data-i18n="subtitle">Sistem Pemesanan Online</p>
      <div id="lang-toggle" class="lang-toggle"></div>
    </header>

    <!-- Search -->
    <div class="search-bar">
      <input type="text" id="search-input" data-i18n-placeholder="searchPlaceholder" placeholder="Cari menu..." oninput="setSearch(this.value)"/>
    </div>

    <!-- Categories -->
    <nav id="categories" class="categories"></nav>

    <!-- Product list -->
    <main id="product-list" class="product-list"></main>

    <!-- Cart floating button -->
    <button id="cart-fab" class="cart-fab" onclick="toggleCart()">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
        <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
      </svg>
      <span id="cart-badge" class="cart-badge">0</span>
    </button>

    <!-- Cart panel -->
    <div id="cart-overlay" class="cart-overlay" onclick="toggleCart()"></div>
    <div id="cart-panel" class="cart-panel">
      <div class="cart-header">
        <h2 data-i18n="cartTitle">Keranjang</h2>
        <button onclick="toggleCart()" class="close-btn">&times;</button>
      </div>
      <div id="cart-items" class="cart-items"></div>
      <div id="cart-footer" class="cart-footer">
        <div class="cart-total">
          <span data-i18n="total">Total</span>
          <span id="cart-total-amount">Rp 0</span>
        </div>
        <button id="checkout-btn" class="checkout-btn" onclick="submitOrder()" disabled data-i18n="checkout">
          Pesan Sekarang
        </button>
      </div>
    </div>

    <!-- Order form -->
    <div id="order-form-overlay" class="order-form-overlay" style="display:none">
      <div class="order-form">
        <h2 data-i18n="confirmOrderTitle">Konfirmasi Pesanan</h2>
        <div class="form-group">
          <label data-i18n="nameLabel">Nama Anda (opsional)</label>
          <input type="text" id="customer-name" data-i18n-placeholder="namePlaceholder" placeholder="Untuk dipanggil saat pesanan siap">
        </div>
        <div class="form-group">
          <label data-i18n="tableLabel">No. Meja / Catatan (opsional)</label>
          <input type="text" id="table-num" data-i18n-placeholder="tablePlaceholder" placeholder="Contoh: Meja 3">
        </div>
        <div class="form-group">
          <label data-i18n="noteLabel">Catatan</label>
          <textarea id="order-note" data-i18n-placeholder="notePlaceholder" placeholder="Permintaan khusus..." rows="2"></textarea>
        </div>
        <div class="form-total">
          <span data-i18n="total">Total</span>: <strong id="form-total">Rp 0</strong>
        </div>
        <div class="form-actions">
          <button onclick="closeOrderForm()" class="btn-secondary" data-i18n="cancel">Batal</button>
          <button onclick="confirmOrder()" class="btn-primary" data-i18n="confirmSubmit">Kirim Pesanan</button>
        </div>
      </div>
    </div>

    <!-- Order success -->
    <div id="order-success" class="order-success" style="display:none">
      <div class="success-content">
        <div class="success-icon">&#10003;</div>
        <h2 data-i18n="orderSent">Pesanan Terkirim!</h2>
        <p id="success-order-id"></p>
        <p id="success-status" class="status-text" data-i18n="statusPending">Menunggu konfirmasi warung...</p>
        <button onclick="resetApp()" class="btn-primary" data-i18n="continueOrder">Pesan Lagi</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
