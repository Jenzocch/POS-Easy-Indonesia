# 自動打包 Windows 安裝檔並發佈到 GitHub Releases
# 觸發方式：推一個 v 開頭的 tag（例如 v2.5.0），或在 Actions 頁面手動 Run workflow
name: Build Windows Installer

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build web bundle
        run: npm run build

      - name: Package and publish installer
        run: npx electron-builder --win --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
